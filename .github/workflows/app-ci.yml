###############################################################################
# app-ci.yml
#
# DataVault — Application CI Pipeline
#
# Triggers: changes to app/** or k8s/** on push to main
#
# Jobs:
#   1. secret-scan      Gitleaks
#   2. test             pytest
#   3. build-scan-push  Docker build → Trivy → ECR push
#   4. update-manifest  Update image tag → git commit → ArgoCD deploys
#
# Authentication: OIDC — no long-lived AWS keys
###############################################################################

name: Application CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"

permissions:
  id-token: write
  contents: write    # needed to push the manifest update commit

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: datavault-api

jobs:

  # ── Job 1: Secret Scan ─────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Application Tests ───────────────────────────────────────────────
  test:
    name: Application Tests (pytest)
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: app/datavault-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 3: Build → Trivy Scan → Push to ECR ───────────────────────────────
  build-scan-push:
    name: Build → Trivy Scan → Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}
      ecr_registry: ${{ steps.ecr_login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: app/datavault-api/app
        run: |
          docker build \
            -t ${{ steps.ecr_login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.short_sha }} \
            .

      # Trivy scans the image BEFORE it reaches ECR.
      # CRITICAL CVEs block the push entirely.
      # Results are uploaded as an artifact for audit purposes.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: >-
            ${{ steps.ecr_login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.short_sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
          output: trivy-results.txt

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-${{ steps.meta.outputs.short_sha }}
          path: trivy-results.txt

      - name: Push image to ECR
        run: |
          # Check if tag already exists (immutable tags — can't overwrite)
          if aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ steps.meta.outputs.short_sha }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Image tag ${{ steps.meta.outputs.short_sha }} already exists — skipping push"
          else
            docker push ${{ steps.ecr_login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.short_sha }}
          fi

  # ── Job 4: Update Kubernetes Manifest ─────────────────────────────────────
  # Updates deployment.yaml with the new ECR image tag.
  # Commits back to main — ArgoCD detects this and deploys.
  # This is the GitOps loop closing.
  update-manifest:
    name: Update Deployment Manifest
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update image tag in deployment.yaml
        run: |
          NEW_IMAGE="${{ needs.build-scan-push.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-scan-push.outputs.image_tag }}"
          echo "New image: ${NEW_IMAGE}"
          sed -i "s|image:.*${{ env.ECR_REPOSITORY }}.*|image: ${NEW_IMAGE}|g" \
            k8s/deployment.yaml

      - name: Commit and push
        run: |
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci: deploy ${{ env.ECR_REPOSITORY }}:${{ needs.build-scan-push.outputs.image_tag }}

          Automated deployment by GitHub Actions.
          Triggered by: ${{ github.actor }}
          Commit: ${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin main
