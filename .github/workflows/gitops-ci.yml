###############################################################################
# gitops-ci.yml
#
# DataVault — GitOps CD Pipeline
#
# Triggers:
#   - workflow_run: fires after "Application CI" completes successfully on push
#   - workflow_dispatch: manual deploy with explicit image tag input
#
# Jobs:
#   1. secret-scan       Gitleaks — blocks on any detected secret
#   2. update-manifest   Patch deployment.yaml image tag → commit → ArgoCD syncs
#
# The image tag is derived from the triggering CI run's commit SHA (workflow_run)
# or supplied directly as an input (workflow_dispatch). No cross-workflow
# artifact passing required.
###############################################################################

name: GitOps CI

on:
  workflow_run:
    workflows: ["Application CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "7-char image tag to deploy (e.g. 05a4b7b)"
        required: true

permissions:
  contents: write   # needed to commit the manifest update back to main

env:
  ECR_REPOSITORY: datavault-api

jobs:

  # ── Job 1: Secret Scan ─────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    # For workflow_run: only proceed when CI succeeded on a push (not a PR run)
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks-action@v2 does not support the workflow_run trigger event.
      # Run the binary directly instead — picks up .gitleaks.toml automatically.
      - name: Install Gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  # ── Job 2: Update Kubernetes Manifest ─────────────────────────────────────
  # Patches the image tag in deployment.yaml and commits back to main.
  # ArgoCD detects the commit and rolls out the new image — closing the GitOps loop.
  update-manifest:
    name: Update Deployment Manifest
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        # Reconstruct the exact tag that app-ci.yml built:
        #   <7-char-sha>-<run-number>  e.g. 05a4b7b-42
        # workflow_run exposes both head_sha and run_number of the triggering run.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "short_sha=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            RUN="${{ github.event.workflow_run.run_number }}"
            echo "short_sha=${SHA}-${RUN}" >> $GITHUB_OUTPUT
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update image tag in deployment.yaml
        run: |
          SHORT_SHA="${{ steps.tag.outputs.short_sha }}"
          echo "Deploying image tag: ${SHORT_SHA}"
          # Replace only the tag portion — registry prefix stays untouched
          sed -i "s|\(image:.*${{ env.ECR_REPOSITORY }}:\)[^ ]*|\1${SHORT_SHA}|g" \
            k8s/deployment.yaml

      - name: Commit and push
        run: |
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No manifest changes — skipping commit" && exit 0
          git commit -m "ci: deploy ${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.short_sha }}

          Automated GitOps update by GitHub Actions.
          Triggered by: ${{ github.actor }}
          Commit: ${{ github.event.workflow_run.head_sha || github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin main
