###############################################################################
# infra-ci.yml
#
# DataVault — Infrastructure CI Pipeline
#
# Triggers: changes to terraform/** on push to main, or manually
#
# Jobs:
#   1. secret-scan      Gitleaks — block if credentials found
#   2. lint             tflint — Terraform code quality
#   3. security         tfsec — Terraform security misconfigurations
#   4. plan             terraform plan — preview changes
#   5. apply            terraform apply — provision infrastructure
#                       (push to main only, not on PRs)
#
# Authentication: OIDC — no long-lived AWS keys stored in GitHub
###############################################################################

name: Infrastructure CI

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:   # allow manual trigger

permissions:
  id-token: write    # required for OIDC token request
  contents: read

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "~1.10"

jobs:

  # ── Job 1: Secret Scan ─────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Terraform Lint ──────────────────────────────────────────────────
  lint:
    name: Terraform Lint (tflint)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init tflint
        run: tflint --init

      - name: Lint bootstrap
        run: tflint --chdir=terraform/bootstrap

      - name: Lint infra
        run: tflint --chdir=terraform/infra

  # ── Job 3: Security Scan ───────────────────────────────────────────────────
  security:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: tfsec bootstrap
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/bootstrap
          additional_args: --minimum-severity HIGH

      - name: tfsec infra
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/infra
          additional_args: --minimum-severity HIGH

  # ── Job 4: Terraform Plan ──────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (bootstrap)
        working-directory: terraform/bootstrap
        run: terraform init

      - name: Terraform apply bootstrap (idempotent)
        working-directory: terraform/bootstrap
        run: terraform apply -auto-approve

      - name: Inject bucket name into backend.tf
        working-directory: terraform/bootstrap
        run: |
          BUCKET=$(terraform output -raw state_bucket_name)
          echo "State bucket: ${BUCKET}"
          sed -i "s|BUCKET_NAME_PLACEHOLDER|${BUCKET}|g" ../infra/backend.tf

      - name: Create terraform.tfvars
        working-directory: terraform/infra
        run: |
          cat > terraform.tfvars <<EOF
          environment      = "dev"
          aws_region       = "eu-west-2"
          project_name     = "datavault"
          allowed_ssh_cidr = "${{ secrets.TF_VAR_ALLOWED_SSH_CIDR }}"
          hostname         = "datavault-k3s"
          EOF

      - name: Terraform init (infra)
        working-directory: terraform/infra
        run: terraform init

      - name: Terraform validate
        working-directory: terraform/infra
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform/infra
        run: terraform plan -out=tfplan -no-color
        continue-on-error: false

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/infra/tfplan
          retention-days: 1

  # ── Job 5: Terraform Apply ─────────────────────────────────────────────────
  # Only runs on push to main — never on pull requests.
  # Downloads the plan artifact from the plan job to ensure
  # exactly what was reviewed gets applied.
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # requires manual approval in GitHub if configured
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (bootstrap)
        working-directory: terraform/bootstrap
        run: terraform init

      - name: Inject bucket name into backend.tf
        working-directory: terraform/bootstrap
        run: |
          BUCKET=$(terraform output -raw state_bucket_name)
          sed -i "s|BUCKET_NAME_PLACEHOLDER|${BUCKET}|g" ../infra/backend.tf

      - name: Create terraform.tfvars
        working-directory: terraform/infra
        run: |
          cat > terraform.tfvars <<EOF
          environment      = "dev"
          aws_region       = "eu-west-2"
          project_name     = "datavault"
          allowed_ssh_cidr = "${{ secrets.TF_VAR_ALLOWED_SSH_CIDR }}"
          hostname         = "datavault-k3s"
          EOF

      - name: Terraform init (infra)
        working-directory: terraform/infra
        run: terraform init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/infra/

      - name: Terraform apply
        working-directory: terraform/infra
        run: terraform apply -auto-approve tfplan
