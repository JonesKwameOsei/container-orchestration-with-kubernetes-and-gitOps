apiVersion: v1
kind: Service
metadata:
  name: datavault-svc
  namespace: datavault-dev
  labels:
    app: datavault-api
    managed-by: kubectl
spec:
  type: NodePort
  selector:
    app: datavault-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
      NodePort: 30080
