apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datavault-hpa
  namespace: datavault-dev
  labels:
    app: datavault-api
    managed-by: kubectl
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datavault-api
  minReplicas: 3
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
